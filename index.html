          </g>
          
          <g class="radar_label">

          </g>

  <g class="radarWrapper"></g>

      <div id="insertHere"></div>

      
      <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border-color); opacity: 0.5;">
      
      <div class="toggle-controls">
        <div class="toggle-container">
          <label class="toggle-label"></label>
